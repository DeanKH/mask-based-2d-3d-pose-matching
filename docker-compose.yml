services:
  pose-matching:
    build: .
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/workspace
    command: [
      "--mask", "/workspace/mask.png",
      "--camera", "/workspace/camera_info.json",
      "--model", "/workspace/mask-generation/model/pen.step",
      "--scale", "0.001",
      "--image", "/workspace/input.png",
      "--output", "/workspace/result.png",
      "--rerun", "/workspace"
    ]

  verify-pose:
    build: .
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/workspace
    network_mode: host
    entrypoint: ["/opt/build/verify_pose"]
    command: [
      "--model", "/workspace/mask-generation/model/pen.step",
      "--camera", "/workspace/camera_info.json",
      "--image", "/workspace/input.png",
      "--pose", "/workspace/correct_pose.json",
      "--scale", "0.001"
    ]

  cache-builder:
    build: .
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/workspace
    entrypoint: ["/opt/build/pose_cache_builder"]
    command: [
      "--camera", "/workspace/camera_info.json",
      "--model", "/workspace/mask-generation/model/pen.step",
      "--scale", "0.001",
      "--output", "/workspace/pose_cache.bin",
      "--directions", "96",
      "--in-plane", "8",
      "--depth-steps", "10",
      "--local-directions", "12",
      "--local-in-plane", "12",
      "--local-depth", "5",
      "--local-cone-angle", "30",
      "--threads", "8"
    ]

  pose-matching-cached:
    build: .
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/workspace
    entrypoint: ["/opt/build/pose_matching_cached"]
    command: [
      "--mask", "/workspace/mask.png",
      "--camera", "/workspace/camera_info.json",
      "--model", "/workspace/mask-generation/model/pen.step",
      "--scale", "0.001",
      "--cache", "/workspace/pose_cache.bin",
      "--image", "/workspace/input.png",
      "--output", "/workspace/result_cached.png",
      "--rerun", "/workspace",
      "--max-candidates", "10",
      "--fatol", "1e-4",
      "--xatol", "1e-3",
      "--contour-points", "4000",
      "--lm-tolerance", "1e-9",
      "--refine-method", "nelder-mead",
      "--early-termination-iou", "0.90"
    ]

  visualize-poses:
    build: .
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/workspace
    network_mode: host
    entrypoint: ["/opt/build/visualize_poses"]
    command: [
      "--camera", "/workspace/camera_info.json",
      "--model", "/workspace/mask-generation/model/pen.step",
      "--scale", "0.001",
      "--pose", "/workspace/pose_result-0.json",
      "--pose", "/workspace/pose_result-1.json",
      "--pose", "/workspace/pose_result-2.json",
      "--rerun-grpc", "rerun+http://127.0.0.1:9876/proxy",
      # "--rerun", "/workspace/poses.rrd"
    ]
